name: Build iOS
description: Build iOS App

runs:
    using: composite
    steps:
        - name: Set up Node
          uses: ./.github/actions/setup-node
          with:
              registry-url: ${{ env.PRIVATE_NPM_REPOSITORY_URL }}

        - name: Set up iOS
          uses: ./.github/actions/setup-ios

        - name: Build iOS App
          shell: bash
          working-directory: ios
          run: bundle exec fastlane pr
